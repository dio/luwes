static_resources:
  listeners:
    - name: request-ui
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: request_ui
                generate_request_id: true

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          ts:           "%START_TIME%"
                          request_id:   "%REQ(X-REQUEST-ID)%"
                          method:       "%REQ(:METHOD)%"
                          path:         "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          status:       "%RESPONSE_CODE%"
                          flags:        "%RESPONSE_FLAGS%"
                          duration_ms:  "%DURATION%"
                          bytes_in:     "%BYTES_RECEIVED%"
                          bytes_out:    "%BYTES_SENT%"
                          upstream:     "%UPSTREAM_HOST%"
                          details:      "%RESPONSE_CODE_DETAILS%"

                http_filters:
                  - name: request-ui
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
                      dynamic_module_config:
                        name: request-ui
                      # Per-listener config. Adjust to taste.
                      # record_request_body / record_response_body buffer the full body
                      # before forwarding -- adds latency. Off by default.
                      filter_config:
                        "@type": type.googleapis.com/google.protobuf.StringValue
                        value: >
                          {
                            "record_request_headers":  true,
                            "record_response_headers": true,
                            "record_request_body":     false,
                            "record_response_body":    false,
                            "max_body_bytes":          4096
                          }
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: request_ui
                  virtual_hosts:
                    - name: upstream
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: upstream
                            timeout: 30s

  clusters:
    # upstream: replace with your actual service.
    # In the Docker Compose demo this points at the mock upstream container.
    - name: upstream
      connect_timeout: 5s
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: upstream, port_value: 8080 }

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }
