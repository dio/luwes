<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>request-ui</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-monospace,monospace;font-size:13px;background:#0f0f0f;color:#e0e0e0}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;position:sticky;top:0;z-index:10}
header h1{font-size:14px;font-weight:600;color:#fff;white-space:nowrap}
#status{font-size:11px;padding:2px 8px;border-radius:3px;background:#2a2a2a;color:#888}
#status.live{background:#1a3a1a;color:#4caf50}
#status.err{background:#3a1a1a;color:#ef5350}
input#q{flex:1;padding:5px 10px;background:#222;border:1px solid #333;color:#e0e0e0;border-radius:4px;outline:none}
input#q:focus{border-color:#555}
label{display:flex;align-items:center;gap:6px;color:#888;font-size:12px;white-space:nowrap;cursor:pointer}
input[type=checkbox]{accent-color:#4caf50}
button{padding:5px 12px;background:#222;border:1px solid #333;color:#aaa;border-radius:4px;cursor:pointer}
button:hover{background:#2a2a2a;color:#fff}
#count{font-size:11px;color:#555;white-space:nowrap}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:#161616;position:sticky;top:45px;z-index:9}
th{padding:6px 10px;text-align:left;font-size:11px;color:#666;font-weight:500;border-bottom:1px solid #222;user-select:none}
th:nth-child(1){width:60px} /* id */
th:nth-child(2){width:170px} /* ts */
th:nth-child(3){width:55px} /* method */
th:nth-child(4){width:auto} /* path */
th:nth-child(5){width:55px} /* status */
th:nth-child(6){width:70px} /* duration */
th:nth-child(7){width:80px} /* flags */
th:nth-child(8){width:40%} /* error/details */
tbody tr{border-bottom:1px solid #1a1a1a;cursor:pointer}
tbody tr:hover{background:#1c1c1c}
tbody tr.err{background:#1f1010}
tbody tr.err:hover{background:#251414}
tbody tr.slow{background:#1a1a10}
tbody tr.slow:hover{background:#222214}
td{padding:5px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ccc}
td.method{color:#7ec8e3}
td.status-2xx{color:#4caf50}
td.status-3xx{color:#ffd54f}
td.status-4xx{color:#ff9800}
td.status-5xx{color:#ef5350}
td.flags{color:#ef5350;font-size:11px}
td.details{color:#ef5350;font-size:11px}
#detail{display:none;position:fixed;right:0;top:0;bottom:0;width:520px;background:#131313;border-left:1px solid #2a2a2a;overflow-y:auto;padding:16px;z-index:20}
#detail.open{display:block}
#detail h2{font-size:13px;color:#fff;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
#detail button.close{background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:0}
#detail button.close:hover{color:#fff}
.section{margin-bottom:14px}
.section h3{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kv{display:grid;grid-template-columns:140px 1fr;gap:2px 8px;font-size:12px}
.kv .k{color:#666}
.kv .v{color:#ccc;word-break:break-all}
.kv .v.err{color:#ef5350}
.kv .v.ok{color:#4caf50}
pre.body{background:#1a1a1a;padding:8px;border-radius:4px;font-size:11px;color:#aaa;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto}
.headers-table{font-size:11px;width:100%;border-collapse:collapse}
.headers-table td{padding:2px 4px;border-bottom:1px solid #1a1a1a;vertical-align:top}
.headers-table td:first-child{color:#666;width:180px;min-width:180px}
</style>
</head>
<body>
<header>
  <h1>request-ui</h1>
  <span id="status">connecting...</span>
  <input id="q" type="text" placeholder="Search method, path, flags, errors..." oninput="onSearch()">
  <label><input type="checkbox" id="errorsOnly" onchange="onSearch()"> errors only</label>
  <button onclick="clearSearch()">clear</button>
  <span id="count"></span>
</header>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Time</th>
      <th>Method</th>
      <th>Path</th>
      <th>Status</th>
      <th>Duration</th>
      <th>Flags</th>
      <th>Error / Details</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div id="detail">
  <h2>Request detail <button class="close" onclick="closeDetail()">×</button></h2>
  <div id="detail-content"></div>
</div>

<script>
const tbody = document.getElementById('tbody');
const status = document.getElementById('status');
const countEl = document.getElementById('count');
const detail = document.getElementById('detail');
const detailContent = document.getElementById('detail-content');

let rows = [];
let lastID = 0;
let searchTimer = null;
let sse = null;
let pollTimer = null;
let currentSearch = '';
let errorsOnly = false;

function statusClass(code) {
  if (!code || code === 0) return '';
  if (code < 300) return 'status-2xx';
  if (code < 400) return 'status-3xx';
  if (code < 500) return 'status-4xx';
  return 'status-5xx';
}

function errorText(r) {
  if (r.error_details) return r.error_details;
  if (r.response_code_details && r.response_code_details !== 'via_upstream') return r.response_code_details;
  if (r.upstream_failure) return r.upstream_failure;
  return '';
}

function rowHTML(r) {
  const cls = r.has_error ? 'err' : (r.duration_ms > 500 ? 'slow' : '');
  const sc = statusClass(r.response_code);
  const err = errorText(r);
  const ts = r.timestamp ? r.timestamp.replace('T',' ').replace('Z','') : '';
  return '<tr class="'+cls+'" data-id="'+r.id+'" onclick="showDetail('+r.id+')">'
    + '<td>'+r.id+'</td>'
    + '<td>'+ts+'</td>'
    + '<td class="method">'+esc(r.method||'')+'</td>'
    + '<td>'+esc(r.path||'')+'</td>'
    + '<td class="'+sc+'">'+(r.response_code||'')+'</td>'
    + '<td>'+(r.duration_ms ? r.duration_ms.toFixed(1)+'ms' : '')+'</td>'
    + '<td class="flags">'+esc(r.response_flags||'')+'</td>'
    + '<td class="details">'+esc(err)+'</td>'
    + '</tr>';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function prependRows(newRows) {
  if (!newRows || newRows.length === 0) return;
  // Update lastID
  for (const r of newRows) {
    if (r.id > lastID) lastID = r.id;
    rows.unshift(r);
  }
  // Limit to 2000 rows in DOM
  if (rows.length > 2000) rows = rows.slice(0, 2000);
  renderTable();
}

function renderTable() {
  let data = rows;
  if (errorsOnly) data = data.filter(r => r.has_error);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    data = data.filter(r =>
      (r.method||'').toLowerCase().includes(q) ||
      (r.path||'').toLowerCase().includes(q) ||
      (r.response_flags||'').toLowerCase().includes(q) ||
      (r.error_details||'').toLowerCase().includes(q) ||
      (r.response_code_details||'').toLowerCase().includes(q) ||
      (r.upstream_failure||'').toLowerCase().includes(q) ||
      (r.request_id||'').toLowerCase().includes(q)
    );
  }
  tbody.innerHTML = data.map(rowHTML).join('');
  countEl.textContent = data.length + ' rows' + (data.length !== rows.length ? ' ('+rows.length+' total)' : '');
}

function loadInitial() {
  const params = new URLSearchParams();
  params.set('limit', '500');
  if (currentSearch) params.set('q', currentSearch);
  if (errorsOnly) params.set('errors', '1');
  fetch('/api/requests?' + params)
    .then(r => r.json())
    .then(data => {
      rows = data.reverse(); // API returns newest first; we want oldest first in our array
      for (const r of rows) if (r.id > lastID) lastID = r.id;
      renderTable();
    });
}

function connectSSE() {
  if (sse) sse.close();
  sse = new EventSource('/api/stream');
  sse.onopen = () => {
    status.textContent = 'live';
    status.className = 'live';
    clearInterval(pollTimer);
  };
  sse.onmessage = (e) => {
    try {
      const r = JSON.parse(e.data);
      if (r.id > lastID) {
        lastID = r.id;
        rows.unshift(r);
        if (rows.length > 2000) rows.pop();
        renderTable();
      }
    } catch {}
  };
  sse.onerror = () => {
    status.textContent = 'polling';
    status.className = 'err';
    sse.close();
    sse = null;
    // Fall back to polling
    pollTimer = setInterval(poll, 2000);
  };
}

function poll() {
  fetch('/api/requests?since='+lastID+'&limit=200')
    .then(r => r.json())
    .then(data => {
      if (data && data.length > 0) prependRows(data);
    })
    .catch(() => {});
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = document.getElementById('q').value.trim();
    errorsOnly = document.getElementById('errorsOnly').checked;
    if (currentSearch || errorsOnly) {
      // Server-side search
      rows = [];
      lastID = 0;
      loadInitial();
    } else {
      renderTable();
    }
  }, 300);
}

function clearSearch() {
  document.getElementById('q').value = '';
  document.getElementById('errorsOnly').checked = false;
  currentSearch = '';
  errorsOnly = false;
  rows = [];
  lastID = 0;
  loadInitial();
}

function showDetail(id) {
  const r = rows.find(x => x.id === id);
  if (!r) return;

  function kv(k, v, cls) {
    if (!v && v !== 0) v = '';
    return '<div class="k">'+esc(k)+'</div><div class="v'+(cls?' '+cls:'')+'">'+esc(String(v))+'</div>';
  }

  function headersTable(jsonStr) {
    if (!jsonStr) return '<em style="color:#444">none</em>';
    try {
      const arr = JSON.parse(jsonStr);
      if (!arr || arr.length === 0) return '<em style="color:#444">none</em>';
      return '<table class="headers-table">'
        + arr.map(h => '<tr><td>'+esc(h[0])+'</td><td>'+esc(h[1])+'</td></tr>').join('')
        + '</table>';
    } catch { return esc(jsonStr); }
  }

  const errCls = r.has_error ? 'err' : 'ok';
  const sc = statusClass(r.response_code);

  detailContent.innerHTML = ''
    + '<div class="section"><h3>Identity</h3><div class="kv">'
    + kv('request_id', r.request_id)
    + kv('trace_id', r.trace_id)
    + kv('span_id', r.span_id)
    + kv('timestamp', r.timestamp)
    + '</div></div>'

    + '<div class="section"><h3>Request</h3><div class="kv">'
    + kv('method', r.method)
    + kv('path', r.path)
    + kv('host', r.host)
    + kv('request_size', r.request_size_bytes ? r.request_size_bytes + ' B' : '')
    + '</div></div>'

    + '<div class="section"><h3>Request Headers</h3>'
    + headersTable(r.request_headers)
    + '</div>'

    + (r.request_body ? '<div class="section"><h3>Request Body</h3><pre class="body">'+esc(r.request_body)+'</pre></div>' : '')

    + '<div class="section"><h3>Response</h3><div class="kv">'
    + kv('status (upstream)', r.upstream_status, r.upstream_status && r.upstream_status[0] >= '4' ? 'err' : 'ok')
    + kv('response_code (final)', r.response_code, sc)
    + kv('upstream_address', r.upstream_address)
    + kv('response_size', r.response_size_bytes ? r.response_size_bytes + ' B' : '')
    + kv('duration_ms', r.duration_ms ? r.duration_ms.toFixed(2) + ' ms' : '')
    + '</div></div>'

    + '<div class="section"><h3>Response Headers</h3>'
    + headersTable(r.response_headers)
    + '</div>'

    + (r.response_body ? '<div class="section"><h3>Response Body</h3><pre class="body">'+esc(r.response_body)+'</pre></div>' : '')

    + '<div class="section"><h3>Errors</h3><div class="kv">'
    + kv('has_error', r.has_error ? 'yes' : 'no', errCls)
    + kv('response_flags', r.response_flags, r.response_flags ? 'err' : '')
    + kv('error_details', r.error_details, r.error_details ? 'err' : '')
    + kv('response_code_details', r.response_code_details, r.response_code_details && r.response_code_details !== 'via_upstream' ? 'err' : '')
    + kv('upstream_failure', r.upstream_failure, r.upstream_failure ? 'err' : '')
    + '</div></div>';

  detail.classList.add('open');
}

function closeDetail() {
  detail.classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

loadInitial();
connectSSE();
</script>
</body>
</html>
