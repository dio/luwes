static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: spa
                http_filters:
                  # api-backend handles /api/* directly from Go — no upstream.
                  - name: api-backend
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
                      dynamic_module_config:
                        name: spa
                      filter_name: api-backend
                  # spa serves embedded ui/dist assets; falls back to index.html.
                  - name: spa
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
                      dynamic_module_config:
                        name: spa
                      filter_name: spa
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: local
                  virtual_hosts:
                    - name: local
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          # All responses are generated inside the filters.
                          # The route needs a cluster but it is never reached.
                          direct_response:
                            status: 200
                            body: { inline_string: "unreachable" }

admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }
