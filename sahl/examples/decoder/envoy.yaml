static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format_source:
                          inline_string: |
                            [%START_TIME%] "%REQ(:METHOD)% %REQ(:PATH)% %PROTOCOL%"
                            status=%RESPONSE_CODE% cluster=%DYNAMIC_METADATA(decoder:cluster)%
                            model=%DYNAMIC_METADATA(decoder:model)%
                            input_tokens=%DYNAMIC_METADATA(decoder:input_tokens)%
                            output_tokens=%DYNAMIC_METADATA(decoder:output_tokens)%
                            ttft_ms=%DYNAMIC_METADATA(decoder:ttft_ms)%

                http_filters:
                  - name: decoder
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
                      dynamic_module_config:
                        name: decoder
                      filter_name: decoder
                      filter_config:
                        "@type": type.googleapis.com/google.protobuf.StringValue
                        value: '{}'
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: llm_routing
                  virtual_hosts:
                    - name: providers
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster_header: x-cluster  # set by the decoder filter
                            timeout: 30s

  clusters:
    - name: openai
      connect_timeout: 10s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: openai
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api.openai.com, port_value: 443 }
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: api.openai.com

    - name: anthropic
      connect_timeout: 10s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: anthropic
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api.anthropic.com, port_value: 443 }
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: api.anthropic.com

    - name: default
      connect_timeout: 5s
      type: STATIC
      load_assignment:
        cluster_name: default
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 11000 }

admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }
