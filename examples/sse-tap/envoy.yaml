static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress
                # Access log includes sse_tap metadata injected by the filter.
                # %DYNAMIC_METADATA(sse_tap:key)% reads from w.SetMetadata calls.
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format_source:
                          inline_string: |
                            [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%"
                            status=%RESPONSE_CODE% duration=%DURATION%ms
                            input_tokens=%DYNAMIC_METADATA(sse_tap:input_tokens)%
                            output_tokens=%DYNAMIC_METADATA(sse_tap:output_tokens)%

                http_filters:
                  - name: sse-tap
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
                      dynamic_module_config:
                        name: sse-tap
                      filter_name: sse-tap
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: local
                  virtual_hosts:
                    - name: llm_backend
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            # Point this at your LLM provider or a mock SSE server.
                            # For local testing: use mock_sse_server.py in this directory.
                            cluster: llm_backend

  clusters:
    - name: llm_backend
      connect_timeout: 5s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: llm_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 11000  # mock SSE server or real backend

admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }
