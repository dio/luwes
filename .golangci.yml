version: "2"

formatters:
  enable:
    - gofmt

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - nilerr
    - prealloc
    - unparam

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - shadow          # too noisy for filter code
      - fieldalignment  # hand-tuned layouts

issues:
  exclude-dirs:
    - bench
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
    - path: "shared/fake/"
      linters:
        - unparam
    - path: "examples/"
      linters:
        - unparam
