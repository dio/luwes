version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - gosimple
    - nilerr
    - prealloc
    - unparam

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - shadow     # too noisy for filter code
      - fieldalignment  # we hand-tune layouts already

issues:
  exclude-dirs:
    - bench        # benchmarks use testing.B idioms that trigger unused
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
    - path: "shared/fake/"
      linters:
        - unparam  # fake implementations accept params they don't use
    - path: "examples/"
      linters:
        - unparam
