name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC (abi-drift only)

# SHAs pinned to latest tags as of 2025-05-17:
#   actions/checkout@v4          34e114876b0b11c390a56381ad16ebd13914f8d5
#   actions/setup-go@v5          40f1582b2485089dde7abd97c1529aa768e1baff
#   actions/cache@v4             0057852bfaa89a56745cba8c7296529d2fc39830
#   actions/upload-artifact@v4   ea165f8d65b6e75b540449e92b4886f43607fa02
# golangci-lint pinned in tools/go.mod via `tool` directive: v2.1.6

env:
  ENVOY_VERSION: "1.38.0"
  ZIG_VERSION: "0.16.0"
  CGO_ENABLED: "1"

jobs:
  # ---------------------------------------------------------------------------
  # lint: make format-check + make lint
  # golangci-lint version is pinned in tools/go.mod (`tool` directive, Go 1.24).
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - run: make format-check
      - run: make lint

  # ---------------------------------------------------------------------------
  # test: make vet + make test
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - run: make vet
      - run: make test

  # ---------------------------------------------------------------------------
  # bench: make bench + alloc regression gate
  # Hard ceilings per benchmark -- ns/op not gated (CI runner variance).
  # ---------------------------------------------------------------------------
  bench:
    name: bench (alloc regression)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - run: make bench

      - name: alloc regression gate
        run: |
          python3 - <<'EOF'
          import sys, re

          CEILINGS = {
              "BenchmarkHeaderAuthAccept": 0,
              "BenchmarkGetOne":           0,
              "BenchmarkGetMiss":          0,
              "BenchmarkGetChunks":        0,
              "BenchmarkHeaderAuthReject": 2,
              "BenchmarkGet":              2,
              "BenchmarkGetAll":           2,
              "BenchmarkFilterCreate":     2,
          }

          failures = []
          with open("bench/results.txt") as f:
              for line in f:
                  m = re.match(r"(Benchmark\w+)-\d+\s+\d+\s+[\d.]+\s+\S+\s+[\d.]+\s+B/op\s+(\d+)\s+allocs/op", line)
                  if not m:
                      continue
                  name, allocs = m.group(1), int(m.group(2))
                  if name in CEILINGS and allocs > CEILINGS[name]:
                      failures.append(f"REGRESSION: {name} got {allocs} allocs/op, ceiling is {CEILINGS[name]}")

          if failures:
              for f in failures:
                  print(f)
              sys.exit(1)
          else:
              print("alloc check passed")
          EOF

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: bench-results
          path: bench/results.txt

  # ---------------------------------------------------------------------------
  # build-linux: make build-linux-amd64-examples + make verify
  # Zig cached in .bin/ to match Makefile convention.
  # ---------------------------------------------------------------------------
  build-linux:
    name: cross-compile linux
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: cache zig
        id: cache-zig
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .bin/zig
          key: zig-${{ env.ZIG_VERSION }}-x86_64-linux

      - name: download zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          URL="https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz"
          mkdir -p .bin
          curl -fsSL "$URL" | tar -xJ --strip-components=1 -C .bin

      - run: make build-linux-amd64-examples ZIG_BIN=.bin/zig
      - run: make verify

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: examples-linux-amd64
          path: dist/*.linux-amd64.so

  # ---------------------------------------------------------------------------
  # e2e: make e2e (header-auth, real Envoy v1.38.0)
  # Zig and Envoy cached in .bin/ to match Makefile convention.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (header-auth)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    needs: [build-linux]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: cache zig
        id: cache-zig
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .bin/zig
          key: zig-${{ env.ZIG_VERSION }}-x86_64-linux

      - name: download zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          URL="https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz"
          mkdir -p .bin
          curl -fsSL "$URL" | tar -xJ --strip-components=1 -C .bin

      - name: cache envoy
        id: cache-envoy
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .bin/envoy
          key: envoy-${{ env.ENVOY_VERSION }}-linux-amd64

      - name: download envoy
        if: steps.cache-envoy.outputs.cache-hit != 'true'
        run: make .bin/envoy

      - name: build header-auth .so
        run: make build-linux-amd64 EXAMPLE=header-auth ZIG_BIN=.bin/zig

      - run: make e2e

  # ---------------------------------------------------------------------------
  # abi-drift: make check-abi-drift (weekly schedule only)
  # ---------------------------------------------------------------------------
  abi-drift:
    name: check abi drift (weekly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - run: make check-abi-drift
