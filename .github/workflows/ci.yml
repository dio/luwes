name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# SHAs pinned to latest tags as of 2025-05-17:
#   actions/checkout@v6.0.2        de0fac2e4500dabe0009e67214ff5f5447ce83dd
#   actions/setup-go@v6.4.0        4a3601121dd01d1626a1e23e37211e3254c1c06c
#   actions/setup-node@v6.4.0      48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
#   actions/cache@v5.0.5           27d5ce7f107fe9357f9df03efb73ab90386fccae
#   actions/upload-artifact@v7.0.1 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
# golangci-lint pinned in tools/go.mod via `tool` directive: v2.1.6

env:
  ENVOY_VERSION: "1.38.0"
  ZIG_VERSION: "0.16.0"
  CGO_ENABLED: "1"

jobs:
  # ---------------------------------------------------------------------------
  # lint: make format-check + make lint
  # golangci-lint version is pinned in tools/go.mod (`tool` directive, Go 1.24+).
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - run: make format-check
      - run: make lint

  # ---------------------------------------------------------------------------
  # test: make vet + make test + make examples/test
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - run: make vet
      - run: make test
      - name: example unit tests
        run: make examples/test

  # ---------------------------------------------------------------------------
  # coverage: per-package coverage report + floor enforcement + coveralls
  # Excludes abi_impl (CGO/live Envoy), shared/mocks (generated), cmd, bench.
  # coverallsapp/github-action@v2.3.7  5cbfd81b66ca5d10c19b062c04de0199c215fb6e
  # ---------------------------------------------------------------------------
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: run coverage
        run: |
          PKGS=$(go list ./... | grep -v -E 'abi_impl|shared/mocks|/cmd$|/bench$|/abi$|node_modules')
          go test -race -coverprofile=coverage.out -covermode=atomic $PKGS 2>&1 | tee coverage.txt

      - name: coverage floor
        run: |
          python3 - <<'EOF'
          import sys, re

          FLOORS = {
              "github.com/dio/luwes":                              20,
              "github.com/dio/luwes/examples/header-auth":         60,
              "github.com/dio/luwes/examples/hello":               90,
              "github.com/dio/luwes/examples/sahl/decoder":        45,
              "github.com/dio/luwes/examples/sahl/header-auth":    90,
              "github.com/dio/luwes/examples/sahl/spa":            90,
              "github.com/dio/luwes/examples/sahl/sse-tap":        45,
              "github.com/dio/luwes/shared/fake":                  30,
              "github.com/dio/luwes/shared/utility":               60,
          }

          coverage = {}
          with open("coverage.txt") as f:
              for line in f:
                  m = re.match(r"ok\s+(\S+)\s+\S+\s+coverage:\s+([\d.]+)%", line)
                  if m:
                      coverage[m.group(1)] = float(m.group(2))

          failures = []
          for pkg, floor in FLOORS.items():
              pct = coverage.get(pkg)
              if pct is None:
                  failures.append(f"MISSING: {pkg} not in coverage output")
              elif pct < floor:
                  failures.append(f"LOW: {pkg} = {pct:.1f}% (floor {floor}%)")

          if failures:
              for f in failures:
                  print(f)
              sys.exit(1)
          print("coverage check passed")
          EOF

      - name: upload to coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          file: coverage.out
          format: golang


  # ---------------------------------------------------------------------------
  bench:
    name: bench (alloc regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - run: make bench

      - name: alloc regression gate
        run: |
          python3 - <<'EOF'
          import sys, re

          CEILINGS = {
              "BenchmarkHeaderAuthAccept": 1,  # fake: key escapes due to interface call; real CGO: 0
              "BenchmarkGetOne":           0,
              "BenchmarkGetOneInto":       0,
              "BenchmarkGetMiss":          0,
              "BenchmarkGetChunks":        0,
              "BenchmarkHeaderAuthReject": 2,
              "BenchmarkGet":              2,
              "BenchmarkGetAll":           2,
              "BenchmarkFilterCreate":     2,
          }

          failures = []
          with open("bench/results.txt") as f:
              for line in f:
                  m = re.match(r"(Benchmark\w+)-\d+\s+\d+\s+[\d.]+\s+\S+\s+[\d.]+\s+B/op\s+(\d+)\s+allocs/op", line)
                  if not m:
                      continue
                  name, allocs = m.group(1), int(m.group(2))
                  if name in CEILINGS and allocs > CEILINGS[name]:
                      failures.append(f"REGRESSION: {name} got {allocs} allocs/op, ceiling is {CEILINGS[name]}")

          if failures:
              for f in failures:
                  print(f)
              sys.exit(1)
          else:
              print("alloc check passed")
          EOF

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: bench-results
          path: bench/results.txt

  # ---------------------------------------------------------------------------
  # build-linux: make build-linux-amd64-examples + make verify
  # Zig extracted into .bin/zig-dist/ so its lib/ tree is available at runtime.
  # ---------------------------------------------------------------------------
  build-linux:
    name: cross-compile linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: cache zig
        id: cache-zig
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/zig-dist
          key: zig-${{ env.ZIG_VERSION }}-x86_64-linux

      - name: download zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          URL="https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz"
          mkdir -p .bin/zig-dist
          curl -fsSL "$URL" | tar -xJ --strip-components=1 -C .bin/zig-dist

      - run: make build-linux-amd64-examples
      - run: make verify

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: examples-linux-amd64
          path: dist/*.linux-amd64.so

  # ---------------------------------------------------------------------------
  # e2e: make e2e (all filters: header-auth, header-auth-sahl, sse-tap)
  # libe2e.so is built by `make e2e` from e2e/cmd/main.go — no pre-build needed.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (all filters)
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: cache zig
        id: cache-zig
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/zig-dist
          key: zig-${{ env.ZIG_VERSION }}-x86_64-linux

      - name: download zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          URL="https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz"
          mkdir -p .bin/zig-dist
          curl -fsSL "$URL" | tar -xJ --strip-components=1 -C .bin/zig-dist

      - name: cache envoy
        id: cache-envoy
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/envoy
          key: envoy-${{ env.ENVOY_VERSION }}-linux-amd64

      - name: download envoy
        if: steps.cache-envoy.outputs.cache-hit != 'true'
        run: make download-envoy

      - run: make e2e

  # ---------------------------------------------------------------------------
  # spa-e2e: build libspa.so, run Lightpanda + Playwright browser tests (13)
  # ---------------------------------------------------------------------------
  spa-e2e:
    name: spa e2e (Lightpanda)
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/sahl/spa/e2e/package-lock.json

      - name: cache zig
        id: cache-zig
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/zig-dist
          key: zig-${{ env.ZIG_VERSION }}-x86_64-linux

      - name: download zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          URL="https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz"
          mkdir -p .bin/zig-dist
          curl -fsSL "$URL" | tar -xJ --strip-components=1 -C .bin/zig-dist

      - name: cache envoy
        id: cache-envoy
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/envoy
          key: envoy-${{ env.ENVOY_VERSION }}-linux-amd64

      - name: download envoy
        if: steps.cache-envoy.outputs.cache-hit != 'true'
        run: make download-envoy

      - name: cache Lightpanda binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/lightpanda-node
          key: lightpanda-${{ hashFiles('examples/sahl/spa/e2e/package-lock.json') }}

      - name: install e2e deps
        run: npm ci --prefix examples/sahl/spa/e2e

      - run: make spa-e2e
